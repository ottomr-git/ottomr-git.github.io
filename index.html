<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIMAN 力曼工具箱</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="hero">
    <div class="container">
      <div class="brand-badge">RIMAN</div>
      <h1>力曼工具箱</h1>
      <p class="hero-subtitle">為力曼夥伴打造的數位工具，讓事業經營更輕鬆有效率</p>
    </div>
  </header>

  <main class="container">

    <div class="tools-grid">

      <!-- Tool 01: 肌膚檢測小幫手 -->
      <a class="tool-card" href="/skin-consultation/" target="_blank">
        <div class="tool-icon">🌿</div>
        <div class="tool-body">
          <div class="tool-tag">顧客服務</div>
          <h2 class="tool-name">肌膚檢測小幫手</h2>
          <p class="tool-desc">透過互動問答了解顧客膚質，給予個人化產品推薦與日常保養建議</p>
        </div>
        <div class="tool-arrow">→</div>
      </a>

      <!-- Tool 02: 產品計算機 -->
      <a class="tool-card" href="/product-calculator/" target="_blank">
        <div class="tool-icon">🧮</div>
        <div class="tool-body">
          <div class="tool-tag">業務工具</div>
          <h2 class="tool-name">產品計算機</h2>
          <p class="tool-desc">選擇產品與數量，即時計算訂單總金額，輕鬆幫顧客規劃採購清單</p>
        </div>
        <div class="tool-arrow">→</div>
      </a>

      <!-- Tool 03: 配圖製作工具 -->
      <a class="tool-card" href="/image-creator/" target="_blank">
        <div class="tool-icon">🎨</div>
        <div class="tool-body">
          <div class="tool-tag">行銷素材</div>
          <h2 class="tool-name">配圖製作工具</h2>
          <p class="tool-desc">輸入描述或上傳參考圖，透過 AI 一鍵生成符合品牌調性的配圖</p>
        </div>
        <div class="tool-arrow">→</div>
      </a>

      <!-- Tool 04: 新制度解讀小幫手 -->
      <a class="tool-card" href="/riman-reward/" target="_blank">
        <div class="tool-icon">💡</div>
        <div class="tool-body">
          <div class="tool-tag">制度學習</div>
          <h2 class="tool-name">新制度解讀小幫手</h2>
          <p class="tool-desc">五月調價與新獎勵制度有疑問？直接問 AI，秒懂 SP、BP 與晉升條件</p>
        </div>
        <div class="tool-arrow">→</div>
      </a>

    </div>

  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 我是嘟嘟董事
        <a href="https://www.instagram.com/iamdodo.riman/" target="_blank" class="ig-link" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
          </svg>
        </a>
      </p>
    </div>
  </footer>

</body>
</html>
